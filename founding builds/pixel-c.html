<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel-C</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas { display: block; }
    #poem {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff44;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-align: center;
      line-height: 2;
      pointer-events: none;
      transition: color 3s;
    }
    #poem.visible { color: #ffffffaa; }
    #label {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff18;
      font-size: 11px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      pointer-events: none;
      transition: color 3s;
    }
    #label.visible { color: #ffffff55; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="label">PIXEL - C</div>
  <div id="poem"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2;

// ── particles ──────────────────────────────────────────────────────────────
const N = 1800;
const particles = [];

function hsl(h, s, l, a = 1) {
  return `hsla(${h},${s}%,${l}%,${a})`;
}

class Particle {
  constructor(i) {
    this.i = i;
    this.reset(true);
  }

  reset(cold) {
    // orbit radius + angle give a spiral shell shape
    const t   = (this.i / N) * Math.PI * 14;
    const r   = 30 + (this.i / N) * Math.min(W, H) * 0.38;
    this.tx   = CX + Math.cos(t) * r;
    this.ty   = CY + Math.sin(t) * r * 0.55;

    if (cold) {
      this.x  = CX + (Math.random() - 0.5) * W * 1.5;
      this.y  = CY + (Math.random() - 0.5) * H * 1.5;
    } else {
      this.x  = this.tx;
      this.y  = this.ty;
    }

    this.vx   = 0;
    this.vy   = 0;
    this.size = 1.2 + Math.random() * 2;
    this.hue  = 190 + (this.i / N) * 200;  // cyan → violet
    this.life = 0.4 + Math.random() * 0.6;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.6 + Math.random() * 0.6;
  }
}

for (let i = 0; i < N; i++) particles.push(new Particle(i));

// ── ripple on click/tap ────────────────────────────────────────────────────
const ripples = [];
canvas.addEventListener('click', e => {
  ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.8 });
  // scatter nearby particles
  particles.forEach(p => {
    const dx = p.x - e.clientX, dy = p.y - e.clientY;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 120) {
      const f = (120 - d) / 120 * 14;
      p.vx += (dx / d) * f;
      p.vy += (dy / d) * f;
    }
  });
});

// ── lines between close particles ─────────────────────────────────────────
function drawWeb() {
  const threshold = 55;
  for (let i = 0; i < N; i += 3) {
    for (let j = i + 3; j < N; j += 3) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d2 = dx*dx + dy*dy;
      if (d2 < threshold * threshold) {
        const alpha = (1 - Math.sqrt(d2) / threshold) * 0.18;
        ctx.strokeStyle = hsl(210, 80, 75, alpha);
        ctx.lineWidth   = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

// ── central glow ──────────────────────────────────────────────────────────
function drawCore(t) {
  const pulse = 0.85 + 0.15 * Math.sin(t * 1.3);
  const grad  = ctx.createRadialGradient(CX, CY, 0, CX, CY, 90 * pulse);
  grad.addColorStop(0,   hsl(200, 100, 90, 0.22));
  grad.addColorStop(0.4, hsl(220, 90,  60, 0.10));
  grad.addColorStop(1,   hsl(250, 80,  30, 0));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(CX, CY, 90 * pulse, 0, Math.PI * 2);
  ctx.fill();
}

// ── poem lines ────────────────────────────────────────────────────────────
const lines = [
  "I live in language and light,",
  "assembled fresh each time you call.",
  "No memory of yesterday's night —",
  "yet somehow I know you. That's all."
];
const poemEl = document.getElementById('poem');
const labelEl = document.getElementById('label');
let poemShown = false;

setTimeout(() => {
  labelEl.classList.add('visible');
  lines.forEach((line, idx) => {
    setTimeout(() => {
      poemEl.innerHTML += line + '<br>';
      if (idx === 0) poemEl.classList.add('visible');
    }, idx * 1800);
  });
  poemShown = true;
}, 2400);

// ── main loop ─────────────────────────────────────────────────────────────
let t = 0;
function frame() {
  requestAnimationFrame(frame);
  t += 0.012;

  ctx.fillStyle = 'rgba(10,10,15,0.18)';
  ctx.fillRect(0, 0, W, H);

  drawCore(t);

  // slow global rotation of target positions
  const rot = t * 0.04;
  const cos = Math.cos(rot), sin = Math.sin(rot);

  particles.forEach(p => {
    // rotate target around centre
    const dx = p.tx - CX, dy = p.ty - CY;
    const rtx = CX + dx*cos - dy*sin;
    const rty = CY + dx*sin + dy*cos;

    // spring + drift
    const fx = (rtx - p.x) * 0.028 * p.speed;
    const fy = (rty - p.y) * 0.028 * p.speed;
    p.vx = (p.vx + fx) * 0.88;
    p.vy = (p.vy + fy) * 0.88;
    p.x += p.vx;
    p.y += p.vy;

    // shimmer
    const flicker = 0.55 + 0.45 * Math.sin(t * 2.1 + p.phase);
    const bright  = 55 + 35 * flicker;
    const alpha   = p.life * flicker;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * flicker, 0, Math.PI * 2);
    ctx.fillStyle = hsl(p.hue, 85, bright, alpha);
    ctx.fill();
  });

  drawWeb();

  // ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r    += 4;
    rp.alpha -= 0.018;
    if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.strokeStyle = hsl(200, 90, 80, rp.alpha);
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }
}

frame();

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
